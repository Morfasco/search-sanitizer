services:
  # ── SearXNG — internal search engine ──────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETUID, SETGID]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:rw
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:rw
    environment:
      - INSTANCE_NAME=search-sanitizer
    expose:
      - "8080"
    networks:
      - search-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Search Agent — sanitizer + API ────────────────────────────
  agent:
    build: .
    container_name: search-agent
    restart: always
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - search-net
    depends_on:
      searxng:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # Fallback defaults if .env is missing
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - LLM_API_FORMAT=${LLM_API_FORMAT:-ollama}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - FILTER_MODEL=${FILTER_MODEL:-qwen3:4b}
      - SECURITY_MODEL=${SECURITY_MODEL:-qwen3.5-128k:latest}
      - FILTER_CONTEXT_WINDOW=${FILTER_CONTEXT_WINDOW:-32768}
      - SECURITY_CONTEXT_WINDOW=${SECURITY_CONTEXT_WINDOW:-131072}
      - MAX_PAGES_TO_FETCH=${MAX_PAGES_TO_FETCH:-6}
      - MAX_PAGE_CHARS=${MAX_PAGE_CHARS:-20000}
      - RESULTS_PER_QUERY=${RESULTS_PER_QUERY:-5}
      - OCR_ENABLED=${OCR_ENABLED:-true}
      - OCR_DPI=${OCR_DPI:-300}
      - OCR_POINTSIZE=${OCR_POINTSIZE:-20}
      - OCR_WIDTH=${OCR_WIDTH:-2400}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}

networks:
  search-net:
    driver: bridge
